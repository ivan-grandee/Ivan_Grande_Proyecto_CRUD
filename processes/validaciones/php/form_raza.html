<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Raza</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <script src="../../js/registro_razas.js" defer></script>
</head>
<body>
    <h1>Añadir Raza</h1>
    <form method="POST" action="./insert/inser_raza.php">

        <label>Nombre: <input type="text" name="nombre" required></label><br><br>

        <label>Comportamiento: <input type="text" name="comportamiento" required></label><br><br>

        <label>Tamaño:
            <select name="tamaño" required>
                <option value="">-- Selecciona --</option>
                <option value="Pequeño">Pequeño</option>
                <option value="Mediano">Mediano</option>
                <option value="Grande">Grande</option>
                <option value="Gigante">Gigante</option>
            </select>
        </label><br><br>

        <label>Peso (rango, ej: 4-6kg): <input type="text" name="peso" required></label><br><br>
        <label>Características generales: <input type="text" name="caract" required></label><br><br>
        <label>Esperanza de vida (ej: 12-15 años): <input type="text" name="vida" required></label><br><br>

        <button type="submit">Guardar raza</button>
        <a href="../../../view/tabla_razas.php">Cancelar</a>
    </form>
</body>
</html>
