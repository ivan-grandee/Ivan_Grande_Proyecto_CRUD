<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Usuarios
    </title>
    <link rel="stylesheet" type="text/css" href="../css/login.css">
    <script defer src="../procesos/js/registro_usuarios.js"></script>
</head>

<body>
    <div class="loginbox">
        <form action="../scripts/registro_usuarios.php" method="POST">

            <h2>INICIAR SESIÓN</h2>
            <div class="divmail">
                <div class="cajamail">
                    <input type="text" name="username" id="username" placeholder="Introducir usuario" onblur="validaNombre()">
                    <div class="divmail">
                    </div>
                    <p id="error_usuario"></p><br>
                </div>
                <div class="divmail">
                    <div class="cajacontra">
                        <input type="text" name="email" id="email" placeholder="Introducir email" onblur="validaEmail()">
                    </div>
                    <p id="error_email"></p><br>
                </div>
                <div class="divpass">
                    <div class="cajapass">
                        <input type="password" name="password" id="password" placeholder="Introducir contraseña" onblur="validaPassword()">
                    </div>
                    <p id="error_password"></p><br>
                </div>

                <div class="divpass">
                    <div class="cajapass">
                        <input type="password" name="confirmar_password" id="confirmar_password" placeholder="Introducir la misma contraseña" onblur="validaConfirmarPassword()">
                    </div>
                    <p id="error_confirmar_password"></p><br>
                </div>

                
                <div>
                    <input type="submit" name="login" value="Login"></input>
                </div>
            </div>
        </form>
        <p>¿No tienes cuenta?</p>
<a href="registro_usuarios.html">
    <button>Registrarse</button>
</a>
    </div>
    
</body>
</html>
